name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # node:sqlite needs >= 22.13; test the LTS that ships it and current.
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from package.json "packageManager" — don't also pass
      # `version:` here or action-setup errors on the conflict.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build (packages + apps; runs nav lint)
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
