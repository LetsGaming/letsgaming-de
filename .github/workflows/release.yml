# Release — on a version tag only: build + push the server and web images to
# GHCR (ghcr.io/<owner>/<repo>/{server,web}:<version> + :latest), then create a
# GitHub Release with generated notes. Nothing here runs on a normal push.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  packages: write # push images to GHCR

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: server
            dockerfile: apps/server/Dockerfile
          - name: web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # metadata-action lowercases the image name (github.repository keeps the
      # owner's original casing) and derives the :<version> + :latest tags.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Only the web image bakes the public API URL into its client bundle.
          build-args: ${{ matrix.name == 'web' && format('PUBLIC_API_URL={0}', vars.PUBLIC_API_URL) || '' }}

  release:
    runs-on: ubuntu-latest
    needs: images
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
