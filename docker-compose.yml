# Homelab deploy (§10). One container for the Fastify server (API + CMS + sync
# worker) with SQLite + uploaded media on a mounted volume; one for the Astro SSR
# site. Put TLS on your reverse proxy (Traefik/Caddy/nginx + Let's Encrypt).
#
# An analytics ingest runs as a scheduled `pnpm analytics <access.log>` on the
# host (or a sidecar) pointed at the reverse proxy's log — see README.

services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8787"
      DB_PATH: /data/letsgaming.sqlite
      MEDIA_DIR: /data/media
      # Explicit origin(s) for the CMS — do NOT use "*" (that disables credentialed
      # CORS, so the CMS session cookie won't be sent). Comma-separate if needed.
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      # This service sits behind a reverse proxy, so honour X-Forwarded-* for real
      # client IPs (used by the contact rate-limiter).
      TRUST_PROXY: ${TRUST_PROXY:-true}
      GITHUB_USERNAME: ${GITHUB_USERNAME:-LetsGaming}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      CMS_TOKEN: ${CMS_TOKEN:-}
      CMS_ALLOWED_LOGIN: ${CMS_ALLOWED_LOGIN:-LetsGaming}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      CONTACT_FROM: ${CONTACT_FROM:-}
      CONTACT_TO: ${CONTACT_TO:-}
      # Discord presence widget (Lanyard). The user id is public; the server does
      # the fetching + filtering. Which categories show is edited in the CMS.
      DISCORD_USER_ID: ${DISCORD_USER_ID:-}
      # Traffic analytics: mount your reverse-proxy access log (read-only) and set
      # ACCESS_LOG to its path; the server ingests it every 5 min. IP is never stored.
      ACCESS_LOG: ${ACCESS_LOG:-}
      ANALYTICS_OWN_HOST: ${ANALYTICS_OWN_HOST:-}
      # Wakapi (coding time) — LAN-only; the sync worker reaches it over the local
      # network, so no ports are published and nothing is exposed to the internet.
      WAKAPI_URL: ${WAKAPI_URL:-}
      WAKAPI_KEY: ${WAKAPI_KEY:-}
      # Steam (public Web API) — powers "Recently on Steam".
      STEAM_API_KEY: ${STEAM_API_KEY:-}
      STEAM_ID: ${STEAM_ID:-}
    volumes:
      # The store + media are the archive — this volume is what you back up.
      - store:/data
    ports:
      - "8787:8787"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked into the client bundle (browser → API). Public API URL.
        PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8787}
    restart: unless-stopped
    depends_on:
      - server
    environment:
      # SSR (server → API) over the internal network.
      API_URL: http://server:8787
    ports:
      - "8080:4321"

volumes:
  store:
