# Homelab deploy. One container for the Fastify server (API + CMS + sync worker)
# with SQLite + uploaded media on a mounted volume; one for the Astro SSR site.
# Put TLS on your reverse proxy (Traefik/Caddy/nginx + Let's Encrypt).
#
# Traffic analytics are ingested in-process every 5 minutes from the log directory
# mounted via ACCESS_LOG_DIR (below); no separate cron is needed. See
# docs/operations/analytics-ingestion.md.

services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8787"
      # The owner's timezone — the default zone the activity charts bucket in.
      TZ: ${TZ:-Europe/Berlin}
      DB_PATH: /data/letsgaming.sqlite
      MEDIA_DIR: /data/media
      # Explicit origin(s) for the CMS; do NOT use "*" (that disables credentialed
      # CORS, so the CMS session cookie won't be sent). Comma-separate if needed.
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      # This service sits behind a reverse proxy, so honour X-Forwarded-* for real
      # client IPs (used by the contact rate-limiter).
      TRUST_PROXY: ${TRUST_PROXY:-true}
      GITHUB_USERNAME: ${GITHUB_USERNAME:-LetsGaming}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      CMS_TOKEN: ${CMS_TOKEN:-}
      CMS_ALLOWED_LOGIN: ${CMS_ALLOWED_LOGIN:-LetsGaming}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      CONTACT_FROM: ${CONTACT_FROM:-}
      CONTACT_TO: ${CONTACT_TO:-}
      # Discord presence widget (Lanyard). The user id is public; the server does
      # the fetching + filtering. Which categories show is edited in the CMS.
      DISCORD_USER_ID: ${DISCORD_USER_ID:-}
      # Traffic analytics (Top paths/referrers/browsers/OS/devices) from the
      # reverse-proxy access log. Set ACCESS_LOG (the log's path INSIDE the
      # container, under /logs) and ACCESS_LOG_DIR (the HOST directory that holds
      # it, mounted below). Leave both unset to disable; engagement stats still
      # work. The IP is dropped at parse time and never stored.
      ACCESS_LOG: ${ACCESS_LOG:-}
      ANALYTICS_OWN_HOST: ${ANALYTICS_OWN_HOST:-}
      # Wakapi (coding time), LAN-only; the sync worker reaches it over the local
      # network, so no ports are published and nothing is exposed to the internet.
      WAKAPI_URL: ${WAKAPI_URL:-}
      WAKAPI_KEY: ${WAKAPI_KEY:-}
      # RAWG (game database), resolves game names to cover art + genre for the
      # playtime module. Optional.
      RAWG_API_KEY: ${RAWG_API_KEY:-}
    volumes:
      # The store + media are the archive; this volume is what you back up.
      - store:/data
      # The HOST directory that holds the access log, mounted read-only at /logs.
      # A directory (not the file) so a rotated or replaced log (e.g. a script that
      # swaps the file with mv) is picked up with no restart. Unset ACCESS_LOG_DIR
      # falls back to an empty volume, so the mount is always valid and analytics
      # from the log stay off until you set it.
      #
      # This container runs as `node`, so the log has to be world-readable (o+r)
      # in a traversable directory (o+x). *Whatever writes the file owns that*,
      # and for a remote proxy that's scripts/ingest-analytics.sh, which chmods
      # 0644 before an atomic mv and now refuses to report success otherwise.
      #
      # Do NOT fix this here. `group_add: ["4"]`, `chgrp adm <log>`, a host-side
      # `chmod 640` — all of them fix a file that ingest-analytics.sh replaces on
      # its next run, so they work exactly once and then stop with nothing having
      # changed. If the log is written locally instead (logrotate, a local nginx),
      # give the *writer* the mode: `create 0644 root root` in the logrotate stanza.
      - ${ACCESS_LOG_DIR:-logs_empty}:/logs:ro
    ports:
      - "8787:8787"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked into the client bundle (browser → API). Public API URL.
        PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8787}
    restart: unless-stopped
    depends_on:
      - server
    environment:
      # SSR reads the store directly (read-only) — no HTTP hop to the API. Same
      # paths as the server; the volume is mounted :ro below so web physically
      # can't write, which is what keeps it from racing the server's migrations.
      DB_PATH: /data/letsgaming.sqlite
      MEDIA_DIR: /data/media
      # Same owner timezone as the server, so SSR and the API bucket alike.
      TZ: ${TZ:-Europe/Berlin}
      # No DISCORD_USER_ID here, deliberately: presence enablement is a CMS display
      # decision resolved from the store, and the live Discord data is fetched by
      # the browser from the server's /api/presence. The web process never talks to
      # Lanyard, so it needs no presence secret. (This is the presence/enablement
      # split — keep it that way; don't re-add the id to make a card light up.)
      # Kept as a fallback for when the store file isn't reachable (buildSiteView
      # falls back to this, then to the committed fixture). Also lets the browser
      # find the API for presence/CMS/media, which stays cross-origin.
      API_URL: http://server:8787
    volumes:
      # Read-only: web reads the store the server writes. WAL lets this reader see
      # committed writes without blocking the writer.
      - store:/data:ro
    ports:
      - "8080:4321"

volumes:
  store:
  # Empty fallback so the /logs mount is valid when ACCESS_LOG_DIR is unset.
  logs_empty:
